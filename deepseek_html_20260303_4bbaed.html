            width: 100%;

            font-size: 24px;
            font-weight: bold;
            padding: 18px 60px;

            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 0 #992e2e;
            transition: all 0.1s ease;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto 20px;
        }
        
        .download-btn:hover {
            transform: translateY(3px);
            box-shadow: 0 7px 0 #992e2e;
        }
        
        .download-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #992e2e;
        }
        
        .footer-note {

            font-size: 14px;
